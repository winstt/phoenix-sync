[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# SPA: route all paths to index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Netlify Identity redirect
[[redirects]]
  from = "/api/auth"
  to   = "/.netlify/identity"
  status = 200
